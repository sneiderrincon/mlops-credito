name: CI - MLOps Credito

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Build imagen Docker
      run: docker build -t mlops-credito .

    - name: Test health endpoint
      run: |
        docker run -d -p 8000:8000 --name test-api mlops-credito
        for i in {1..30}; do
          sleep 3
          curl -sf http://localhost:8000/ && break
          echo "Intento $i fallido, esperando..."
        done
        curl -f http://localhost:8000/
        docker stop test-api

    - name: Test endpoint predicción
      run: |
        docker run -d -p 8000:8000 --name test-pred mlops-credito
        for i in {1..30}; do
          sleep 3
          curl -sf http://localhost:8000/ && break
          echo "Intento $i fallido, esperando..."
        done
        curl -X POST http://localhost:8000/predecir \
          -H "Content-Type: application/json" \
          -d '{"features": [0.5, 1.2, -0.3, 0.8, 1.5, -1.1, 0.2, 0.9, -0.4, 0.7]}'
        docker stop test-pred