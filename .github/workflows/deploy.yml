@"
name: CI - MLOps Credito

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependencias
      run: pip install -r requirements.txt

    - name: Test modelo
      run: |
        mkdir -p models
        python -c "from app.model import train_and_save, predict; train_and_save(); r = predict([0.5, 1.2, -0.3, 0.8, 1.5, -1.1, 0.2, 0.9, -0.4, 0.7]); print(r); assert 'probabilidad' in r"

    - name: Build imagen Docker
      run: docker build -t mlops-credito .

    - name: Verificar imagen
      run: docker images mlops-credito
"@ | Out-File -FilePath .github\workflows\deploy.yml -Encoding utf8